# Ringfall example provider policy. Do not put API keys in this file.
# Real OpenRouter calls must remain manually enabled outside committed defaults.
version: 0.1

default_provider: mock

providers:
  mock:
    enabled: true
    purpose: offline_dev_and_schema_smoke
    deterministic: true

  openrouter:
    enabled: false
    purpose: manual_real_model_runs_only
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    require_parameters: true
    allow_fallbacks: true
    default_data_collection: allow
    local_llm_serving: false
    rented_gpu_llm: false

provider_routing:
  dev_cheap:
    provider: mock
    openrouter_sort: price
    data_collection: allow
  canonical:
    provider: openrouter
    openrouter_sort: price
    data_collection: allow
    require_cost_logging: true
    require_trace_logging: true
  quality_heavy:
    provider: openrouter
    openrouter_sort: throughput
    data_collection: allow
    require_cost_logging: true
    require_trace_logging: true
  private_workflow:
    provider: openrouter
    data_collection: deny

retry_defaults:
  max_retries:
    l1_pulse: 1
    l1_scene: 2
    l2_seat: 2
    l2_chair: 2
    l3: 2
    verifier: 1
  backoff:
    initial_ms: 500
    max_ms: 8000
    multiplier: 2

concurrency_defaults:
  l1_pulse: 10
  l1_scene: 4
  l2: 3
  l3: 1
  verifier: 2

security_notes:
  - Keep API keys in environment variables only.
  - Keep local overrides in ignored configs/local*.yaml files.
  - Never commit provider secrets or real run credentials.
  - Do not make OpenRouter the default provider before mock schema paths exist.
